# Each tip is one line of actionable advice

- tip: "Use 'ciw' in nvim to change an entire word without selecting it first"
- tip: "Press 'gcc' to toggle comment on current line (LazyVim)"
- tip: "In tmux, C-a [ enters copy mode — use vim motions to select, then y to yank"
- tip: "'zz' centers the screen on your cursor — great after a search"
- tip: "Use '<leader>ff' to fuzzy-find files, '<leader>fg' to grep across project"
- tip: "In lazygit, press 'space' to stage/unstage a file, 'c' to commit"
- tip: "'va{' selects everything inside and including braces — 'vi{' excludes them"
- tip: "C-a T opens sesh session picker — jump between projects instantly"
- tip: "Use 'gd' to go to definition, 'gr' to find references (LSP)"
- tip: "'<leader>aa' opens Avante AI chat — ask Claude about your code"
- tip: "In yazi, press 'o' to open file, '.' to toggle hidden files"
- tip: "Use 'z=' on a misspelled word for suggestions, ']s' to jump to next"
- tip: "'<C-o>' jumps back to previous location, '<C-i>' jumps forward"
- tip: "In tmux, C-a z zooms a pane full-screen — press again to unzoom"
- tip: "Use ':s/old/new/g' for current line, ':%s/old/new/g' for whole file"
- tip: "fzf in shell: Ctrl-T inserts file path, Ctrl-R searches history, Alt-C cds"
- tip: "'dap' deletes a paragraph, 'yap' yanks a paragraph"
- tip: "In lazygit, 'P' pushes, 'p' pulls — uppercase = push"
- tip: "'<leader>e' toggles the file explorer in nvim"
- tip: "Use 'J' in normal mode to join current line with next — great for reflowing"
- tip: "Atuin: press Ctrl-R then type — it searches across all shell sessions"
- tip: "Use ':Lazy' in nvim to manage plugins — update, clean, check health"
- tip: "'<leader>gg' opens lazygit directly from nvim"
- tip: "In tmux copy mode, 'v' starts selection, 'V' selects line, y copies"
- tip: "Use 'cit' to change text inside HTML/XML tags"
- tip: "'*' searches forward for word under cursor, '#' searches backward"
- tip: "zoxide: 'z project' jumps to most-used dir matching 'project'"
- tip: "'<leader>sr' opens search-and-replace across project (Spectre)"
- tip: "Use 'q:' to open command history window — edit and re-run past commands"
- tip: "In tmux, C-a ! breaks current pane into its own window"
