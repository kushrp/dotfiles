# gitleaks config — used by the pre-commit hook in .pre-commit-config.yaml
# and by the GitHub Actions workflow.
#
# We extend gitleaks' default ruleset (https://github.com/gitleaks/gitleaks)
# and add an allowlist for known-safe placeholders.

[extend]
useDefault = true

# --- Custom rules ------------------------------------------------------------
# gitleaks' defaults catch most secrets but a few patterns are worth being
# explicit about for our setup.

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-(?:api|admin)\d{2}-[A-Za-z0-9_-]{80,}'''
keywords = ["sk-ant-"]

[[rules]]
id = "openai-project-key"
description = "OpenAI project / user key"
regex = '''sk-(?:proj|user|svcacct|admin)-[A-Za-z0-9_-]{40,}'''
keywords = ["sk-proj-", "sk-user-", "sk-svcacct-", "sk-admin-"]

# --- Allowlist ---------------------------------------------------------------
# Paths & patterns that gitleaks should NOT flag.

[allowlist]
description = "Placeholders, templates, and committed test fixtures"
# Files where placeholder secrets are intentional.
paths = [
  '''^\.extra\.example$''',
  '''^README\.md$''',
  '''^AGENTS\.md$''',
  '''^\.pre-commit-config\.yaml$''',
  '''^\.gitleaks\.toml$''',
  '''^\.github/workflows/.*$''',
]

# Patterns that look like secrets but are obvious placeholders.
regexes = [
  '''(ghp|gho|ghu|ghs|ghr)_x{20,}''',         # ghp_xxxxxxxxxxxx
  '''sk-ant-x{20,}''',                         # sk-ant-xxxxxxxxx
  '''sk-x{20,}''',                             # sk-xxxxxxxxx
  '''AKIA[X]{16}''',                           # AWS placeholder
  '''AIza[X]{20,}''',                          # Google placeholder
  '''ANTHROPIC_API_KEY="sk-ant-\.\.\."''',     # `sk-ant-...` literal
  '''OPENAI_API_KEY="sk-\.\.\."''',            # `sk-...` literal
  '''<your-token>''',
  '''YOUR_TOKEN_HERE''',
  '''REPLACE_ME''',
]

# Stop-word list — if a line containing a secret-looking pattern ALSO
# contains one of these words, treat it as a placeholder.
stopwords = [
  "example",
  "placeholder",
  "template",
  "REDACTED",
  "REPLACE",
  "TODO",
  "FIXME",
  "<your",
  "your-",
]
