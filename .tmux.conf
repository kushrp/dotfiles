# ~/.tmux.conf — Tokyo Night, Ghostty, macOS. Verified against tmux >= 3.4.
# Plugin manager: tpm. After first launch: prefix + I to install plugins.
# Cheatsheet: prefix ?  (all keys)  ·  prefix C-h  (curated popup)

# ─── Terminal / true color (Ghostty) ────────────────────────────────────────
set -g  default-terminal "tmux-256color"
# Modern truecolor advertisement (replaces the old `terminal-overrides ...:Tc`).
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",*:usstyle"        # undercurl / colored underlines (nvim)
set -g  allow-passthrough on                   # image protocols, some nvim plugins

# ─── Core behavior ───────────────────────────────────────────────────────────
set -g  prefix C-a                 # screen-style prefix; one-handed, transfers everywhere
unbind  C-b
bind    C-a send-prefix            # press Ctrl-a twice to send a literal C-a to the shell

set -g  base-index 1               # windows start at 1
setw -g pane-base-index 1          # panes start at 1
set -g  renumber-windows on        # no gaps after closing a window

set -sg escape-time 10             # near-zero esc lag for nvim
set -g  repeat-time 400
set -g  history-limit 100000
set -g  focus-events on
set -g  set-clipboard on           # OSC 52 clipboard (works over SSH in Ghostty)
set -g  display-time 2000
set -g  display-panes-time 2000
set -g  mouse on
set -g  allow-rename off          # apps can't rename the window via OSC…
setw -g automatic-rename on        # …tmux names it from the format below instead:
# Window tab = "N panes" when a window holds several chats, else the single
# chat's title (Claude sets the pane title; shell panes fall back to the command),
# clipped to 24 chars so tabs stay narrow. Multi-pane chats are labelled per-pane
# on the border (see pane-border-format).
set -g automatic-rename-format "#{?#{>:#{window_panes},1},#{window_panes} panes,#{=24:#{?#{||:#{==:#{pane_title},#{host}},#{==:#{pane_title},}},#{pane_current_command},#{pane_title}}}}"

# Bell monitoring: when a background window rings the bell (e.g. the Claude
# Stop hook fires while you're in another window), flag it in the status bar.
setw -g monitor-bell on
set  -g visual-bell off            # status-bar flag, not an audible/visual beep
set  -g bell-action other          # alert on bells from windows other than the active one

# ─── Reload ──────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message " ~/.tmux.conf reloaded"

# ─── Splits — | and -, keep cwd ──────────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -fv -c "#{pane_current_path}"
bind \\ split-window -fh -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ─── Pane navigation ─────────────────────────────────────────────────────────
# C-h/j/k/l cross seamlessly between tmux panes and nvim splits via
# vim-tmux-navigator (loaded below). prefix h/j/k/l is the explicit fallback.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r n next-window
bind -r p previous-window
bind   Tab last-window
bind   o   last-pane
bind   m   resize-pane -Z         # zoom / unzoom current pane
bind -r "<" swap-window -t -1 \; previous-window
bind -r ">" swap-window -t +1 \; next-window

# Mouse pane focus, tuned for many small mouse-aware (Claude) panes.
# Default MouseDown1Pane is `select-pane \; send -M` — it ALWAYS forwards the
# click into the pane's app, so when you click an inactive pane a mouse-aware
# TUI (claude/nvim) can swallow the focusing click, costing several tries.
# Here: clicking an INACTIVE pane only focuses it (not forwarded → can't be
# eaten); clicking the already-active pane still forwards, so in-app clicks work.
bind -n MouseDown1Pane if -F "#{pane_active}" { select-pane -t= ; send-keys -M } { select-pane -t= }
# pane-border-status puts a title row on each pane that belongs to the BORDER,
# so a plain click there normally selects nothing (a dead zone on small panes).
# Make a border/title click focus that pane; drag-resize stays on MouseDrag1Border.
bind -n MouseDown1Border select-pane -t=

# ─── Copy mode — vi keys + macOS pbcopy ──────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Y   send-keys -X copy-pipe-and-cancel "pbcopy" \; send-keys -X cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"

# ─── Claude Code: jump to a line in the conversation, keyboard-only ───────────
# Claude runs in the alt screen, so plain copy-mode can't scroll its history.
# `f` sends Ctrl-O then [ to Claude (dumps the transcript into tmux's normal
# scrollback), then opens copy-mode straight at an upward `?` search prompt:
# type a word, Enter, jump to it, then V (line) or v+E (URL) and y to copy.
# Bump the -d delays if copy-mode opens before the dump has landed.
bind f send-keys C-o \; run-shell -d 0.2 \; send-keys "[" \; run-shell -d 0.3 \; copy-mode \; send-keys ?
# `/` — already-visible / shell scrollback: copy-mode + upward search in one key.
bind / copy-mode \; send-keys ?
# In copy-mode, select a URL then `O` opens it in the default browser.
bind -T copy-mode-vi O send-keys -X copy-pipe-and-cancel "xargs open"

# ─── Popups / scratch (display-popup, tmux >= 3.2) ───────────────────────────
bind g display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "lazygit"
bind C-g display-popup -E -d "#{pane_current_path}" -w 80% -h 70% "zsh"
bind t display-popup -E -w 80% -h 80% "tmux new-session -A -s scratch"
# prefix a → central agent dashboard: every agent pane across all sessions, with
# live preview + jump/kill/lazygit. The control board for parallel `cc` agents.
# Lowercase (no shift) since it's the most-used agent key. Pass the invoking
# client so the jump retargets it (the popup has its own).
bind a display-popup -E -w 90% -h 85% "cc-dashboard '#{client_name}'"
# New Claude session in the current project dir — fires even while a Claude
# session has the keyboard, since tmux's prefix (C-a) is captured before Claude
# sees keys. w = new window, v = split pane (sibling beside the current one).
# Plain keys (no shift, and clear of prefix n/p navigation so a fumble can't
# switch windows). w overrides tmux's default choose-window — use `prefix a`
# (dashboard) or `prefix S` for that. Hardcodes --dangerously-skip-permissions
# to match `cc` (tmux can't read $CC_FLAGS). For an isolated agent on its own
# branch, use `cc <name>` (worktree) instead.
bind w new-window      -c "#{pane_current_path}" "claude --dangerously-skip-permissions"
bind v split-window -h -c "#{pane_current_path}" "claude --dangerously-skip-permissions"
# Curated cheatsheet popup (rendered with bat; falls back to less).
bind C-h display-popup -E -w 80% -h 80% \
  "bat --style=plain --paging=always --language=markdown ~/.tmux-cheatsheet.md 2>/dev/null || less -R ~/.tmux-cheatsheet.md"
# Searchable list of ALL key bindings.
unbind ?
bind ? display-popup -E -w 80% -h 80% "tmux list-keys | less -R"

# ─── Sessions ────────────────────────────────────────────────────────────────
# s → sesh: fuzzy-jump across live sessions, zoxide dirs, and worktrees in an
# fzf popup. The fastest "get me to that project/agent" key. sesh connect
# attaches or creates as needed; an empty pick (Esc) is a no-op.
bind s run-shell "sesh connect \"$(sesh list -i | fzf-tmux -p 60%,60% --no-sort --reverse --border-label ' sesh ' --prompt '⚡ ')\""
bind S choose-tree -Zs            # native session/window tree (fallback)
bind C-Space run-shell "sesh last"   # flip to the previous session (sesh). NB:
                                     # prefix C-s is owned by tmux-resurrect (save).
bind C-c new-session
bind X confirm-before -p "kill session #S? (y/n)" kill-session

# Space → discoverable action menu (replaces the rarely-used next-layout). Each
# row mirrors an existing key, so it's a menu for the keys you haven't memorized.
bind Space display-menu -T "#[align=centre,fg=#7aa2f7] tmux actions " -x C -y C \
  "session tree"     s "choose-tree -Zs" \
  "agent dashboard"  a "display-popup -E -w 90% -h 85% \"cc-dashboard '#{client_name}'\"" \
  "new Claude window" w "new-window -c \"#{pane_current_path}\" \"claude --dangerously-skip-permissions\"" \
  "" \
  "split right"      "|" "split-window -h -c \"#{pane_current_path}\"" \
  "split down"       "-" "split-window -v -c \"#{pane_current_path}\"" \
  "zoom pane"        m "resize-pane -Z" \
  "" \
  "lazygit"          g "display-popup -E -d \"#{pane_current_path}\" -w 90% -h 90% lazygit" \
  "grab text (extrakto)" e "run-shell \"~/.tmux/plugins/extrakto/scripts/open.sh '#{pane_id}'\"" \
  "cheatsheet"       "?" "display-popup -E -w 80% -h 80% \"tmux list-keys | less -R\"" \
  "" \
  "reload config"    r "source-file ~/.tmux.conf" \
  "kill session"     X "confirm-before -p \"kill #S? (y/n)\" kill-session"

# ─── Tokyo Night status bar ──────────────────────────────────────────────────
# Hand-rolled so the bar (and the cheatsheet hint) is correct even before
# plugins install and on remote boxes. The tokyo-night-tmux plugin is left
# commented out below so this stays the single source of truth.
set -g status on
set -g status-interval 5
set -g status-position top            # bar at the top — the "which agent needs me" glance
set -g status-justify absolute-centre   # window tabs float dead-center; session left, meta right
# Base black matches Ghostty's background (#16161e) so the bar melts into the
# terminal instead of floating on a slightly-different navy (#1a1b26 seam).
set -g status-style "bg=#16161e,fg=#c0caf5"

set -g status-left-length 40
# Rounded powerline pill for the session name:  cap · text · cap .
set -g status-left "#[fg=#7aa2f7,bg=#16161e]#[fg=#16161e,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=#16161e]"

setw -g window-status-separator ""
# Per-window Claude agent state — @cc_win is the window rollup (neediest pane),
# set by cc-status.sh; per-pane truth lives in @cc_status. Single-width glyphs
# (emoji like ⏸/🤖/✅ render 2 cells but tmux width-counts them as 1, so they
# collide with the next char — "two glyphs"). Nerd-Font state icons:
#  waiting (pause) /  working (sync) /  done (check). If any renders
# double-width and misaligns tabs, revert to geometric: ◆ / ▸ / ✓.
CC_ICON='#{?#{==:#{@cc_win},waiting}, ,#{?#{==:#{@cc_win},working}, ,#{?#{==:#{@cc_win},done}, ,}}}'
# Inactive tab text goes AMBER when its window is waiting on input, so a crew
# member that needs you is unmissable from the top bar; dim otherwise. The
# conditional yields only a color token (no commas), safe inside the #[] style.
WS_FG='#{?#{==:#{@cc_win},waiting},#e0af68,#565f89}'
setw -g window-status-format         "#[fg=${WS_FG},bg=#16161e] ${CC_ICON}#I #W "
# Active window: rounded cyan pill.
setw -g window-status-current-format "#[fg=#7dcfff,bg=#16161e]#[fg=#16161e,bg=#7dcfff,bold] ${CC_ICON}#I #W#{?window_zoomed_flag,  ,} #[fg=#7dcfff,bg=#16161e]"
setw -g window-status-activity-style "fg=#e0af68"
setw -g window-status-bell-style "fg=#16161e,bg=#e0af68,bold"

# Right side: agent tally · PREFIX indicator (only when ⌃a is armed) · hints ·
# battery · clock. Styles are set BEFORE each #{?...} so commas inside styles
# don't confuse the conditional parser. Clock sits in its own padded pill with
# a clear gap so it doesn't blend into the hint text.
set -g status-right-length 200
# A hard "│" divider + a distinct cyan clock (no bg pill — dark-on-purple read
# as "blended"). The cyan also separates it from the dim ⏱duration in the
# Claude statusline directly above. NOTE: reload to see changes — a running
# tmux server keeps the OLD config until `tmux kill-server` or prefix r.
# The agent tally + "agents" hint are a clickable range (range=user|ccagents);
# MouseDown1Status (below) opens the dashboard when the click lands there.
set -g status-right "#[range=user|ccagents]#(cc-agent-count)#[fg=#16161e,bg=#e0af68,bold]#{?client_prefix,   ,}#[fg=#565f89,bg=#16161e] ⌃a a / click agents#[norange] · ⌃a ? keys  #[fg=#414868]│ #(tmux-sysload) #[default]"

# Second status line: dim context for the ACTIVE pane — git branch + cwd. Reads
# every status-interval (5s). Falls back to "no-git" outside a repo.
set -g status 2
set -g 'status-format[1]' "#[fg=#737aa2,bg=#16161e] #[fg=#7aa2f7]#[fg=#737aa2] #(cd '#{pane_current_path}' && git rev-parse --abbrev-ref HEAD 2>/dev/null || echo no-git) #[fg=#414868]│ #[fg=#737aa2] #{=/60/…:pane_current_path} #[align=right]#[fg=#414868]#{session_windows} win · #{window_panes} panes #[default]"

# Click the agent tally → open the dashboard popup; clicks elsewhere on the
# status line keep their default (select the window under the cursor).
bind -n MouseDown1Status {
  if -F "#{==:#{mouse_status_range},ccagents}" {
    display-popup -E -w 90% -h 85% "cc-dashboard '#{client_name}'"
  } {
    select-window -t=
  }
}

set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-lines heavy
# Focus emphasis: dim the foreground of INACTIVE panes so the active one stands
# out. fg-only (no bg) so it stays consistent — TUIs like Claude/nvim repaint
# their own cells anyway, and plain shell panes visibly recede when unfocused.
set -g window-style        "fg=#737aa2"
set -g window-active-style "fg=#c0caf5"
# Auto-label each pane with the Claude chat in it. Claude Code sets the pane
# title to the live chat summary; show it on the pane's top border. Plain shells
# (title empty or == hostname) fall back to "cmd · dir". Active pane highlighted.
# Window tabs stay short on purpose — a full chat summary per tab would overflow
# the status bar; the per-pane border is where the chat context lives.
set -g pane-border-status top
set -g pane-border-format "#[fg=#565f89]#{?pane_active,#[fg=#7dcfff]#[bold],} #{?#{||:#{==:#{pane_title},#{host}},#{==:#{pane_title},}},#{pane_current_command} · #{b:pane_current_path},#{pane_title}} #[default]"
set -g mode-style "bg=#7aa2f7,fg=#1a1b26"
set -g message-style "bg=#292e42,fg=#c0caf5"
set -g message-command-style "bg=#292e42,fg=#c0caf5"
set -g popup-border-style "fg=#7aa2f7"
set -g popup-border-lines rounded

# ─── Plugins (tpm) — keep this block near the BOTTOM. ─────────────────────────
# Install: prefix + I | Update: prefix + U | Remove: prefix + alt-u
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'   # needs the nvim half too (configured)
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# extrakto: prefix e → fzf-grab any path / URL / git hash / word off the screen
# (insert, copy, or open). Pairs with the f / / copy bindings for agent output.
set -g @plugin 'laktak/extrakto'
set -g @extrakto_key 'e'
set -g @extrakto_fzf_tool 'fzf'
set -g @extrakto_split_direction 'p'      # popup, matches the rest of the UI
# Theme plugin left OFF so the hand-rolled bar + cheatsheet hint stay in charge.
# Enable it only if you want its git/battery widgets (it will own the bar):
# set -g @plugin 'janoamaral/tokyo-night-tmux'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize tpm — KEEP THIS LINE LAST.
run '~/.tmux/plugins/tpm/tpm'
